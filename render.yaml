# Render Blueprint for Talent-Augmenting Layer Hosted App
# Deploy with: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: talent-augmenting-layer-hosted
    runtime: docker
    dockerfilePath: ./hosted/Dockerfile
    plan: free  # or 'starter' for production
    autoDeploy: true
    envVars:
      # LLM Configuration (set in Render dashboard)
      - key: LLM_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false  # Secret - set manually in dashboard
      - key: LLM_MODEL
        value: gemini-2.5-flash-lite
      
      # Google OAuth (set in Render dashboard)
      - key: GOOGLE_CLIENT_ID
        sync: false  # Set manually
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # Secret - set manually
      
      # Security
      - key: SECRET_KEY
        generateValue: true  # Auto-generate on creation
      
      # App Configuration
      - key: APP_URL
        value: https://talent-augmenting-layer-hosted.onrender.com  # Update with your actual URL
      
      # Optional: Email (SendGrid)
      - key: SENDGRID_API_KEY
        sync: false  # Optional - set if you want email reminders
      - key: FROM_EMAIL
        value: noreply@yourdomain.com

      # Optional: Vanguard pilot anonymised export to Google Drive (OAuth user credentials)
      # Run `python -m hosted.gdrive_oauth_setup` locally once to obtain the refresh token.
      - key: PILOT_EXPORT_ENABLED
        value: "false"  # Set to "true" only when Drive export is fully configured
      - key: GDRIVE_FOLDER_ID
        sync: false  # Google Drive folder ID for daily JSONL export
      - key: GDRIVE_OAUTH_CLIENT_ID
        sync: false  # OAuth 2.0 Client ID from Google Cloud Console
      - key: GDRIVE_OAUTH_CLIENT_SECRET
        sync: false  # OAuth 2.0 Client Secret
      - key: GDRIVE_OAUTH_REFRESH_TOKEN
        sync: false  # Refresh token from gdrive_oauth_setup script
      
      # Database (automatically provided by Render if you add a PostgreSQL database)
      - key: DATABASE_URL
        fromDatabase:
          name: talent-augmenting-layer-db
          property: connectionString

databases:
  - name: talent-augmenting-layer-db
    databaseName: talent-augmenting-layer
    plan: free  # 90-day free tier, then paid
    # Note: Free tier expires after 90 days. For long-term, use 'starter' plan ($7/mo)
