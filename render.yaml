# Render Blueprint for Talent-Augmenting OS (TAOS) Hosted App.
#
# This blueprint references the SERVICES YOU ARE PAYING FOR:
#   - service:  proworker-hosted   (Docker web service)
#   - database: proworker-db       (managed PostgreSQL)
#
# The earlier `talent-augmenting-layer-hosted` service and
# `talent-augmenting-layer-db` database were created during the rename
# and are not in active use. See `docs/RENDER_CONSOLIDATION.md` for the
# decommission steps; this file no longer references them.
#
# Deploy with: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: proworker-hosted
    runtime: docker
    dockerfilePath: ./hosted/Dockerfile
    plan: starter  # Production tier. Free tier sleeps after ~15 min idle.
    autoDeploy: true
    envVars:
      # LLM Configuration (set in Render dashboard)
      - key: LLM_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false  # Secret: set manually in dashboard
      - key: LLM_MODEL
        value: gemini-2.5-flash-lite

      # Google OAuth (set in Render dashboard)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # Security
      - key: SECRET_KEY
        generateValue: true  # Auto-generated on creation

      # App Configuration
      - key: APP_URL
        value: https://proworker-hosted.onrender.com

      # Optional: Email (SendGrid)
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@proworker-hosted.onrender.com

      # Optional: pilot anonymised export to Google Drive (OAuth user credentials).
      # Run `python -m hosted.gdrive_oauth_setup` locally once to obtain the refresh token.
      - key: PILOT_EXPORT_ENABLED
        value: "false"
      - key: GDRIVE_FOLDER_ID
        sync: false
      - key: GDRIVE_OAUTH_CLIENT_ID
        sync: false
      - key: GDRIVE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GDRIVE_OAUTH_REFRESH_TOKEN
        sync: false

      # Rate limiter storage. Default in-memory is fine for single-instance.
      # If you scale to >1 instance, point this at a Redis URL.
      - key: TAOS_RATE_LIMIT_STORAGE
        value: "memory://"

      # Billing scaffold (off by default; flip when ready to monetise)
      - key: ENABLE_BILLING
        value: "false"

      # MCP authentication enforcement.
      # Default false to preserve the in-flight Vanguard pilot (some clients
      # are still configured without OAuth). Flip to "true" once the pilot
      # has ended; every /mcp connection then requires a Bearer token.
      - key: MCP_REQUIRE_AUTH
        value: "false"

      # Database (provided by the proworker-db reference below)
      - key: DATABASE_URL
        fromDatabase:
          name: proworker-db
          property: connectionString

databases:
  - name: proworker-db
    databaseName: proworker
    plan: starter  # Production tier; $7/mo at time of writing.
